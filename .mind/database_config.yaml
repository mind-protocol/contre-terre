database:
  backend: falkordb
  falkordb:
    host: localhost
    port: 6379
    graph_name: mind_platform
embedding:
  provider: local
  model: all-mpnet-base-v2
  dimension: 768

# Script to run at deploy for graph seeding/upsert.
# Default: runtime.l4.citizen_l1_ensure.bulk_ensure_citizens
# Override with a custom module path to seed differently per project.
# The function receives (citizens_dir: str) and must be idempotent.
seed:
  script: runtime.l4.citizen_l1_ensure.bulk_ensure_citizens
  brain_json: data/base_seed_brain.json  # Path to pre-generated seed brain (relative to project root)

# Behaviors toggled at init/deploy time.
# All default to true. Set to false to disable for specific projects.
# Example: contre-terre citizens don't know their repo or docs.
behaviors:
  file_ingest: true       # Ingest repo files as narrative nodes in graph
  doc_ingest: true        # Ingest docs/ chain into graph (OBJECTIVES, PATTERNS, etc.)
  mind_ingest: true       # Ingest .mind/ files into graph
  overview: true          # Generate repository map (map.md)
  embeddings: true        # Compute embeddings for ingested nodes
  health_checks: true     # Run health checks after init
  capabilities_graph: true # Ingest capabilities into graph
  citizen_seed: true      # Upsert citizen brains at deploy (uses seed.script)
  mcp_config: true        # Configure .mcp.json for membrane server
  know_all_citizens: true  # Inject ALL citizen Actor nodes into graph (full directory)
  relational_seeds: true   # Create relationship links between citizens from profiles
