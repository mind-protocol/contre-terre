# =============================================================================
# MODULE MANIFEST
# =============================================================================
#
# This file maps code to documentation and carries rich context about each module.
#
# WHEN TO UPDATE:
# - Creating new code directories → add module mapping
# - Creating new doc modules → add mapping
# - Refactoring/moving code → update patterns
# - Changing module maturity → update status
#
# VALIDATION:
# `mind validate` warns about unmapped code directories.
#
# =============================================================================

modules:
  # ---------------------------------------------------------------------------
  # EXAMPLE MODULE (delete or modify)
  # ---------------------------------------------------------------------------
  # example:
  #   code: "src/example/**"           # Glob pattern for source files
  #   docs: "docs/area/example/"       # Path to documentation
  #   tests: "tests/example/"          # Path to tests (optional)
  #
  #   maturity: DESIGNING              # DESIGNING | CANONICAL | PROPOSED | DEPRECATED
  #   owner: agent                     # agent | human | team-name
  #
  #   entry_points:                    # Main files to start reading (optional)
  #     - index.ts
  #     - Example.tsx
  #
  #   internal:                        # Implementation details, not public API (optional)
  #     - helpers.ts
  #     - utils.ts
  #
  #   depends_on:                      # Other modules this requires (optional)
  #     - types
  #     - utils
  #
  #   patterns:                        # Conventions to follow (optional)
  #     - "React functional components"
  #     - "Tailwind styling"
  #
  #   notes: |                         # Quick context (optional)
  #     Brief description of what this module does
  #     and any important context for working with it.

# =============================================================================
# YOUR MODULES
# =============================================================================

# Uncomment and modify as you create modules:

# types:
#   code: "src/types/**"
#   docs: "docs/core/types/"
#   maturity: CANONICAL
#   owner: human
#   notes: |
#     Core type definitions. Changes affect entire codebase.

  contact:
    code: "CONTACT.md"
    docs: "docs/worldbuilding/contact/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - seismique
      - personnages
    notes: |
      Systeme du langage tactile. 5 modes, idiolectes, mort linguistique.

  seismique:
    code: "MONDE.md"
    docs: "docs/worldbuilding/seismique/"
    maturity: DESIGNING
    owner: agent
    notes: |
      Tremens permanent, magnitudes, cataclysmes. Cause du Contact.

  geographie:
    code: "MONDE.md"
    docs: "docs/worldbuilding/geographie/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - seismique
    notes: |
      8 couches geologiques, element-tueur par couche, verticalite.

  personnages:
    code: "PERSONNAGES.md"
    docs: "docs/narration/personnages/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - contact
      - metiers
    notes: |
      7 personnages, arcs, dynamiques, idiolectes de paire, ordre de mort.

  structure:
    code: "STRUCTURE.md"
    docs: "docs/narration/structure/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - geographie
      - personnages
    notes: |
      8 chapitres, scenes cles, influences, courbes paralleles.

  metiers:
    code: "METIERS.md"
    docs: "docs/narration/metiers/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - personnages
    notes: |
      15 metiers, cascade de competences, assignations, doublon explosifs.

  visual_style:
    docs: "docs/publication/visual_style/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - structure
      - contact
      - geographie
    notes: |
      Identite visuelle : palette textuelle (8 chapitres), couverture,
      infographie, separateurs. Deux directions en attente de validation.
