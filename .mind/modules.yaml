# =============================================================================
# MODULE MANIFEST
# =============================================================================
#
# This file maps code to documentation and carries rich context about each module.
#
# WHEN TO UPDATE:
# - Creating new code directories → add module mapping
# - Creating new doc modules → add mapping
# - Refactoring/moving code → update patterns
# - Changing module maturity → update status
#
# VALIDATION:
# `mind validate` warns about unmapped code directories.
#
# =============================================================================

modules:

# =============================================================================
# WORLDBUILDING (documentation du roman)
# =============================================================================

  contact:
    code: "CONTACT.md"
    docs: "docs/worldbuilding/contact/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - seismique
      - personnages
    notes: |
      Systeme du langage tactile. 5 modes, idiolectes, mort linguistique.

  seismique:
    code: "MONDE.md"
    docs: "docs/worldbuilding/seismique/"
    maturity: DESIGNING
    owner: agent
    notes: |
      Tremens permanent, magnitudes, cataclysmes. Cause du Contact.

  geographie:
    code: "MONDE.md"
    docs: "docs/worldbuilding/geographie/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - seismique
    notes: |
      8 couches geologiques, element-tueur par couche, verticalite.

  personnages:
    code: "PERSONNAGES.md"
    docs: "docs/narration/personnages/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - contact
      - metiers
    notes: |
      7 personnages, arcs, dynamiques, idiolectes de paire, ordre de mort.

  structure:
    code: "STRUCTURE.md"
    docs: "docs/narration/structure/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - geographie
      - personnages
    notes: |
      8 chapitres, scenes cles, influences, courbes paralleles.

  metiers:
    code: "METIERS.md"
    docs: "docs/narration/metiers/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - personnages
    notes: |
      15 metiers, cascade de competences, assignations, doublon explosifs.

  visual_style:
    docs: "docs/publication/visual_style/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - structure
      - contact
      - geographie
    notes: |
      Identite visuelle : palette textuelle (8 chapitres), couverture,
      infographie, separateurs. Deux directions en attente de validation.

# =============================================================================
# UNIVERSE — Cities of Light 3e univers
# =============================================================================

  universe_manifest:
    docs: "docs/universe/manifest/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - universe_contact_engine
      - universe_seismic_physics
      - universe_world_geography
      - universe_citizen_model
    notes: |
      world-manifest.json contract between Contre-Terre and Cities of Light engine.
      Contact-first (no voice), seismic physics, vertical zones, metier-based identity.

  universe_contact_engine:
    docs: "docs/universe/contact_engine/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - contact
      - universe_seismic_physics
      - universe_citizen_model
    notes: |
      Contact as computational communication protocol. 5 modes, body zones,
      idiolecte emergence, vocabulary death, Contact-fantome. THE core module.

  universe_citizen_model:
    docs: "docs/universe/citizen_model/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - personnages
      - metiers
      - contact
    notes: |
      Citizen identity by body (tremens, Contact, metiers), not economy.
      Physical degradation, 50-80 population target, death cascade.

  universe_seismic_physics:
    docs: "docs/universe/seismic_physics/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - seismique
      - universe_world_geography
    notes: |
      Tick-based seismic simulation. Background magnitude 4,
      tension accumulation, 10 cataclysm types, building 11, tremens per citizen.
      Self-calibrating via citizen boredom metric. PHYSICS, not narrative.

  universe_world_geography:
    docs: "docs/universe/world_geography/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - geographie
      - seismique
    notes: |
      9 concentric zones (surface to grotte finale). 6 parameters per zone.
      Dynamic connections, habitability gradient, bioluminescence navigation.

  universe_context_assembly:
    docs: "docs/universe/context_assembly/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - universe_citizen_model
      - universe_contact_engine
      - universe_seismic_physics
      - universe_world_geography
    notes: |
      Prompt pipeline for citizen agents. Body-first mood (tremens x Contact x physical),
      metier perception filters, mandatory seismic block. No economics.

  universe_graph_schema:
    docs: "docs/universe/graph_schema/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - universe_citizen_model
      - universe_world_geography
      - universe_contact_engine
    notes: |
      FalkorDB graph using strict 5 node types. Actor=citizen, Space=zone,
      Moment=seisme/death, Narrative=knowledge, Thing=equipment. Contact links weighted.

  universe_narrative_engine:
    docs: "docs/universe/narrative_engine/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - universe_seismic_physics
      - universe_contact_engine
      - universe_citizen_model
    notes: |
      Three parallel tension systems (seismic, Contact, social) as PHYSICS.
      Narrative is EMERGENT, not scripted. Self-calibrating via boredom metric.
      Contact_vitality as health metric. Building 11 as convergence of all tensions.

  universe_experience_design:
    docs: "docs/universe/experience_design/"
    maturity: DESIGNING
    owner: agent
    depends_on:
      - universe_manifest
      - universe_contact_engine
      - universe_seismic_physics
      - universe_citizen_model
      - universe_world_geography
    notes: |
      Experience design — BEFORE implementation. Social survival adventure.
      Human experience, AI experience, game loop, economy, scale, compute budget.
      Self-calibrating physics. Subscription model. MVP = text prototype first.
