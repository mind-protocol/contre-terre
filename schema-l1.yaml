invariants:
  - "Single universal link type: link (relation_kind is a property, not a type)"
  - "5 universal node types: actor, moment, narrative, space, thing"
  - "7 cognitive types map to universal types via the type field"
  - "All floats in specified ranges"
  - "Energy conservation during propagation (Law 2): source depletes exactly its surplus"
  - "No LLM calls inside the tick loop — pure graph mechanics"
  - "Crystallization creates structure from math, not from LLM generation"
  - "Identity changes only through accumulated experience (Law 6), never through single events"
  - "Working memory capacity bounded at 5-7 nodes"
  - "Drives bounded [0, 1]"
  - "Stress stimulus from external systems (GraphCare) capped at 0.5"
  - "Weight consolidation is asymptotic: ΔW = α × U × (1 - W)"
  - "Stability grows from regularity (low coefficient of variation), not frequency"
  - "Structural links (contains, abstracts) are protected from forgetting"
  - "Vocabulary is bidirectional — same grammar for input and output"
  - "Images stored as URIs in object storage — NEVER base64 in FalkorDB (v2.2)"
  - "Image embeddings (CLIP/SigLIP) are first-class physics participants via Sim_vis in coherence (v2.2)"
  - "Flashbulb Vision is fail-loud but NEVER blocks inference or tick execution (v2.2)"
  - "Concept images inherit from medoid via Law 10 crystallization — no generation needed (v2.2)"
  - "Desire images generated on traversal only when energy > threshold AND image_uri is null (v2.2)"
