services:
  - type: web
    name: contre-terre
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: RENDER
        value: "true"
      - key: ENABLE_ORCHESTRATOR
        value: "true"
      - key: HOME_ID
        value: contre-terre
      # FalkorDB (embedded, localhost)
      - key: DATABASE_BACKEND
        value: falkordb
      - key: FALKORDB_HOST
        value: localhost
      - key: FALKORDB_PORT
        value: "6379"
      - key: FALKORDB_GRAPH
        value: contre_terre
      # Embeddings
      - key: EMBEDDING_PROVIDER
        value: local
    disk:
      name: contre-terre-data
      mountPath: /data
      sizeGB: 1
